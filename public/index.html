<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>World Builder</h1>
          <p>City-focused world simulation prototype</p>
        </div>
        <div class="time-controls">
          <button id="pauseBtn" class="small">Pause</button>
          <button id="speed1Btn" class="small active">1x</button>
          <button id="speed3Btn" class="small">3x</button>
          <button id="saveBtn" class="small">Save</button>
          <button id="loadBtn" class="small">Load</button>
          <button id="newBtn" class="small danger">New World</button>
        </div>
      </header>

      <section class="stats" id="statsBar"></section>

      <main class="workspace">
        <aside class="panel tools-panel">
          <h2>Terrain</h2>
          <div class="tool-grid" id="terrainTools"></div>

          <h2>City Tools</h2>
          <div class="tool-grid" id="cityTools"></div>

          <h2>Brush</h2>
          <input id="brushSize" type="range" min="1" max="3" value="1" />
          <div class="hint">Drag on map to paint tiles</div>
        </aside>

        <section class="map-wrap panel">
          <canvas id="gameCanvas" width="960" height="640"></canvas>
        </section>

        <aside class="panel info-panel">
          <h2>Tile Info</h2>
          <div id="tileInfo">Hover over a tile</div>

          <h2>Economy</h2>
          <div id="economyInfo"></div>

          <h2>Legend</h2>
          <ul class="legend">
            <li><span class="swatch grass"></span> Grass</li>
            <li><span class="swatch water"></span> Water</li>
            <li><span class="swatch forest"></span> Forest</li>
            <li><span class="swatch road"></span> Road</li>
            <li><span class="swatch res"></span> Residential</li>
            <li><span class="swatch com"></span> Commercial</li>
            <li><span class="swatch ind"></span> Industrial</li>
          </ul>
        </aside>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>

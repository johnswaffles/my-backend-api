services:
  - type: web
    name: 618food-com
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TTS
        value: gemini-3.1-flash-tts-preview
      - key: GEMINI_TTS_VOICE
        value: Orus
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACES_KEY
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: PORT
        value: 3000
